version: '3.8'
services:
  test-db:
    image: pgvector/pgvector:pg16
    container_name: mumin-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mumin_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-cache:
    image: redis:7-alpine
    container_name: mumin-test-cache
    ports:
      - "6380:6379"
